upstream api_backend {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy to Node.js backend (^~ prevents regex locations from overriding)
    location ^~ /api/ {
        client_max_body_size 55m;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media files from volume mount (^~ prevents regex locations from overriding)
    location ^~ /files/ {
        alias /files/;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # JS/CSS — short cache, must revalidate
    location ~* \.(css|js)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Other static assets — long cache
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|json|webmanifest|mp4|webm)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — try exact file, then directory index, then root
    location / {
        try_files $uri $uri/index.html /index.html;
    }
}
